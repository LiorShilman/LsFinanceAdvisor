<div class="google-sso-container">
    <!-- כותרת ותיאור -->
    <div class="sso-header text-center mb-4" *ngIf="showTitle">
      <h4 class="sso-title mb-2">{{ title }}</h4>
      <p class="sso-subtitle text-muted mb-0">{{ subtitle }}</p>
    </div>

    <!-- Hidden Google button (for auth flow) -->
    <div #hiddenGoogleBtn class="hidden-google-btn"></div>

    <!-- כפתור Google מעוצב -->
    <div class="sso-button-container">
      <button
        type="button"
        [class]="buttonClasses"
        [disabled]="isButtonDisabled"
        (click)="startGoogleSignIn()"
        [attr.aria-label]="buttonText">

        <!-- Loading spinner -->
        <span class="spinner-border spinner-border-sm me-2"
              role="status"
              aria-hidden="true"
              *ngIf="isLoading">
        </span>

        <!-- Google icon -->
        <svg *ngIf="showIcon && !isLoading"
             class="google-icon me-2"
             width="18"
             height="18"
             viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>

        <!-- טקסט הכפתור -->
        <span>{{ isLoading ? 'מתחבר...' : buttonText }}</span>
      </button>

      <!-- הודעת מצב Google API -->
      <div class="text-center mt-2" *ngIf="!isGoogleLoaded">
        <small class="text-muted">
          <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          טוען Google Sign-In...
        </small>
      </div>
    </div>

    <!-- הודעת שגיאה -->
    <div class="alert alert-danger alert-dismissible fade show mt-3"
         role="alert"
         *ngIf="errorMessage">
      <svg class="me-2" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
      </svg>
      {{ errorMessage }}
      <button type="button"
              class="btn-close"
              aria-label="Close"
              (click)="clearError()">
      </button>
    </div>

    <!-- מידע נוסף על אבטחה -->
    <div class="sso-security-info mt-3 text-center" *ngIf="showTitle">
      <small class="text-muted d-flex align-items-center justify-content-center">
        <svg class="me-1" width="12" height="12" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        </svg>
        חיבור מאובטח עם Google
      </small>
    </div>
  </div>
