<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-4 mx-auto">
        
        <!-- כרטיס ההתחברות הראשי -->
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            
            <!-- לוגו וכותרת -->
            <div class="text-center mb-4">
              <div class="mb-3">
                <i class="fas fa-user-tie fa-3x text-primary"></i>
              </div>
              <h2 class="card-title mb-2">מערכת ייעוץ פיננסי</h2>
              <p class="text-muted">התחברו למערכת הייעוץ שלכם</p>
            </div>
  
            <!-- הטופס הקיים שלך -->
            <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
              <div class="mb-3">
                <label for="email" class="form-label">דוא"ל</label>
                <input type="email" 
                       class="form-control" 
                       id="email" 
                       name="email"
                       ngModel 
                       required 
                       email
                       placeholder="הזן את כתובת הדוא״ל שלך">
              </div>
  
              <div class="mb-3">
                <label for="password" class="form-label">סיסמה</label>
                <input type="password" 
                       class="form-control" 
                       id="password" 
                       name="password"
                       ngModel 
                       required
                       placeholder="הזן את הסיסמה שלך">
              </div>
  
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">זכור אותי</label>
              </div>
  
              <button type="submit" 
                      class="btn btn-primary w-100 mb-3"
                      [disabled]="loginForm.invalid || isLoginLoading">
                <span *ngIf="isLoginLoading" 
                      class="spinner-border spinner-border-sm me-2" 
                      role="status"></span>
                {{ isLoginLoading ? 'מתחבר...' : 'התחברות' }}
              </button>
            </form>
  
            <!-- קו הפרדה -->
            <div class="divider my-4">
              <hr class="hr-text" data-content="או">
            </div>
  
            <!-- רכיב Google SSO -->
            <app-google-sso
            [googleClientId]="googleClientId"
            buttonText="המשך עם Google"
            buttonSize="lg"
            (onSuccess)="handleGoogleSuccess($event)">
            </app-google-sso>
  
            <!-- קישורים נוספים -->
            <div class="text-center mt-4">
              <a href="#" class="text-decoration-none">שכחת סיסמה?</a>
              <span class="mx-2 text-muted">|</span>
              <a href="#" class="text-decoration-none">הרשמה</a>
            </div>
  
          </div>
        </div>
  
        <!-- מידע אבטחה -->
        <div class="text-center mt-4">
          <small class="text-muted">
            <i class="fas fa-shield-alt me-1"></i>
            מערכת ייעוץ פיננסי מאובטחת ומוצפנת
          </small>
        </div>
  
      </div>
    </div>
  </div>
