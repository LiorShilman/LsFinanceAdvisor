<div class="container-fluid">
  <!-- Savings and Investments Section -->
  <div class="row">
    <div class="col-md-12">
      <div class="card text-white mb-4">
        <div class="card-body alert alert-primary">
          <div class="card-header">
            <span>
              <i class="bi bi-piggy-bank me-3"></i>
              חסכונות והשקעות
            </span>
            <i class="fs-1 text-success fa fa-plus" (click)="AddRow()" title="הוסף שורת חיסכון"></i>
          </div>
          
          <div class="table-responsive table-striped">
            <table class="table table-borderless">
              <thead>
                <tr>
                  <th scope="col" class="text-center text-success col-md-3 blockquote fw-bold fs-5">
                    <i class="bi bi-bank me-2"></i>
                    שם החיסכון / השקעה
                  </th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5 col-md-2" 
                      data-bs-toggle="tooltip" 
                      data-bs-custom-class="custom-tooltip"
                      data-bs-title='סכום קבוע שמופקד מידי חודש' 
                      data-bs-placement="right">
                    <i class="bi bi-arrow-repeat me-2"></i>
                    נתון חודשי קבוע
                  </th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5 col-md-2" 
                      data-bs-toggle="tooltip" 
                      data-bs-custom-class="custom-tooltip"
                      data-bs-title='הסכום הכולל הקיים כיום בחיסכון/השקעה'
                      data-bs-placement="right">
                    <i class="bi bi-wallet me-2"></i>
                    סכום נוכחי
                  </th>
                  <th scope="col" class="text-center text-success col-md-5 blockquote fw-bold fs-5">
                    <i class="bi bi-chat-text me-2"></i>
                    הערות
                  </th>
                </tr>
              </thead>
              <tbody>
                <ng-container *ngFor='let saving of this.generalInfoService.AllInfo.SavingViewInfo.SavingRows; let i = index'>
                  <tr>
                    <!-- Saving Name -->
                    <td>
                      <input type="text" 
                             name="saving-name-{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold fs-5 text-info" 
                             id="saving-name-{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].Type"
                             placeholder="סוג החיסכון/השקעה">
                    </td>
                    
                    <!-- Monthly Fixed Amount -->
                    <td>
                      <input type="text" 
                             name="saving-monthly-{{i+1}}" 
                             autocomplete="off"
                             [field]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].FixedMonthly"
                             class="form-control fw-bold text-center fs-5 text-primary" 
                             numbersOnly
                             id="saving-monthly-{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].FixedMonthly"
                             placeholder="0">
                    </td>
                    
                    <!-- Current Amount -->
                    <td>
                      <input type="text" 
                             name="saving-current-{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-center fs-5 text-primary"
                             numbersOnly
                             [field]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].CurrentAmount"
                             id="saving-current-{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].CurrentAmount"
                             placeholder="0">
                    </td>
                    
                    <!-- Comments -->
                    <td>
                      <input type="text" 
                             name="saving-comment-{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-info align-middle fs-5" 
                             id="saving-comment-{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.SavingViewInfo.SavingRows[i].Comment"
                             placeholder="הערות נוספות">
                    </td>
                  </tr>
                </ng-container>
                
                <!-- Monthly Savings Summary Row -->
                <tr class="summary-row">
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold blockquote fw-bold fs-5"
                           value="חיסכון חודשי">
                  </td>
                  <td>
                    <input type="text" 
                           disabled
                           class="form-control fw-bold text-center fs-5"
                           [value]="CalcMonthlyInterimAverage() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td>
                    <input type="text" 
                           disabled
                           class="form-control fw-bold text-center fs-5"
                           [value]="CalcCurrAmounts() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Final Summary Section -->
  <div class="row">
    <div class="col-md-12">
      <div class="summary-section">
        <h1 class="summary-title">
          <i class="bi bi-graph-up me-3"></i>
          סה"כ חסכונות והשקעות
        </h1>
        <div class="summary-badges">
          <span class="badge inheritance-badge">
            <i class="bi bi-currency-shekel me-2"></i>
            חודשי: {{CalcMonthlyInterimAverage() | currency:'ILS':'symbol':'.0'}}
          </span>
          <span class="badge inheritance-badge">
            <i class="bi bi-wallet2 me-2"></i>
            כולל: {{CalcSumSaving() | currency:'ILS':'symbol':'.0'}}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
