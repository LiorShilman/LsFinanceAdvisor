<div class="container-fluid">
  <!-- Fixed Expenses Section -->
  <div class="row">
    <div class="col-xl-12">
      <div class="card text-white mb-4">
        <div class="card-body alert alert-primary">
          <div class="card-header">
            <span>
              <i class="bi bi-credit-card me-3"></i>
              הוצאות קבועות
            </span>
            <i class="fs-1 text-success fa fa-plus" (click)="AddRow()" title="הוסף שורה"></i>
          </div>
          
          <div class="table-responsive table-striped">
            <table class="table table-borderless">
              <thead>
                <tr>
                  <th scope="col" class="text-center text-success col-xl-3 blockquote fw-bold fs-5">
                    שם ההוצאה
                  </th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5 col-xl-2" 
                      data-bs-toggle="tooltip" 
                      data-bs-custom-class="custom-tooltip"
                      data-bs-title='אם ההוצאה קבועה , הכנס אותה בתא זה' 
                      data-bs-placement="right">
                    נתון חודשי קבוע
                  </th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5" 
                      data-bs-toggle="tooltip" 
                      data-bs-custom-class="custom-tooltip"
                      data-bs-title='אם ההוצאה משתנה מחודש לחודש , הכנס את הנתונים בתאים לפי החודשים'
                      data-bs-placement="right">
                    חודש 1
                  </th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5">חודש 2</th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5">חודש 3</th>
                  <th scope="col" class="text-center text-success blockquote fw-bold fs-5" 
                      data-bs-toggle="tooltip" 
                      data-bs-custom-class="custom-tooltip"
                      data-bs-title='אם ההוצאה דו-חודשית או יותר , יש לחלק אותה במספר החודשים בהתאם ולסמן אותה כהוצאה חודשית קבועה'
                      data-bs-placement="right">
                    ממוצע
                  </th>
                  <th scope="col" class="text-center text-success col-xl-3 blockquote fw-bold fs-5">הערות</th>
                </tr>
              </thead>
              <tbody>
                <ng-container *ngFor='let expense of this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows; let i = index'>
                  <tr>
                    <td>
                      <input type="text" 
                             name="expenses-name{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold fs-5 text-info" 
                             id="expenses-name{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].Type"
                             placeholder="סוג הוצאה">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-fixed-monthly{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-center fs-5 custom-red-text" 
                             numbersOnly
                             id="expense-fixed-monthly{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].FixedMonthly"
                             placeholder="0">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-monthly-expense-1{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-center fs-5 custom-red-text" 
                             numbersOnly
                             id="expense-monthly-expense-1{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].MonthlyExpense1"
                             placeholder="0">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-monthly-expense-2{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-center fs-5 custom-red-text" 
                             numbersOnly
                             id="expense-monthly-expense-2{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].MonthlyExpense2"
                             placeholder="0">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-monthly-expense-3{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-center fs-5 custom-red-text" 
                             numbersOnly
                             id="expense-monthly-expense-3{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].MonthlyExpense3"
                             placeholder="0">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-monthly-average{{i+1}}" 
                             disabled
                             class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                             id="expense-monthly-average{{i+1}}"
                             [value]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].CalcMonthlyAverage() | currency:'ILS':'symbol':'.0'">
                    </td>
                    <td>
                      <input type="text" 
                             name="expense-comment{{i+1}}" 
                             autocomplete="off"
                             class="form-control fw-bold text-info align-middle fs-5" 
                             id="expense-comment{{i+1}}"
                             [(ngModel)]="this.generalInfoService.AllInfo.FixedExpensesViewInfo.FixedExpenseRows[i].Comment"
                             placeholder="הערות">
                    </td>
                  </tr>
                </ng-container>
                
                <!-- Interim Summary Row -->
                <tr class="summary-row">
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white  fw-bold fs-5"
                           value="סיכום ביניים">
                  </td>
                  <td>
                    <input type="text" 
                           disabled
                           class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                           [value]="CalcMonthlyInterimAverage() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                           [value]="CalcMonthly1Average() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                           [value]="CalcMonthly2Average() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                           [value]="CalcMonthly3Average() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td></td>
                  <td></td>
                </tr>
                
                <!-- Monthly Average Row -->
                <tr class="summary-row">
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white fs-5"
                           value="ממוצע הוצאות חודשי">
                  </td>
                  <td>
                    <input type="text" 
                           disabled 
                           class="form-control fw-bold custom-red-bg text-white text-center fs-5"
                           [value]="CalcMonthlyAvgAverage() | currency:'ILS':'symbol':'.0'">
                  </td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Final Summary Section -->
  <div class="row">
    <div class="col-xl-12">
      <div class="summary-container">
        <div class="summary-item">
          <h2 class="summary-label">
            <i class="bi bi-credit-card me-3"></i>
            סה"כ הוצאות קבועות
          </h2>
          <div class="summary-value">
            <i class="bi bi-currency-shekel me-2"></i>
            {{CalcSumExpenses() | currency:'ILS':'symbol':'.0'}}
          </div>
        </div>
        
        <div class="summary-item">
          <h2 class="summary-label">
            <i class="bi bi-percent me-3"></i>
            אחוז מההכנסות
          </h2>
          <div class="summary-value">
            <i class="bi bi-graph-up me-2"></i>
            {{CalcPercent() | percent:'2.2-2'}}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>💸 מחיר ההרגל והמנויים</h2>
    <app-fixed-expenses-embed 
      srcPath="/LsFinanceAdvisor/assets/fixed-expenses/habit_cost_premium.html">
    </app-fixed-expenses-embed>
  </div>

</div>
